<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Xin Chao Hanoi</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&amp;family=Inter:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            overflow: hidden;
        }

        .slide-container {
            width: 1280px;
            height: 720px;
            position: relative;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Decorative Elements - No gradients, solid shapes with blur */
        .glow-top-right {
            position: absolute;
            width: 700px;
            height: 700px;
            background-color: #EE1D52;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.1;
            top: -300px;
            right: -100px;
            z-index: 0;
        }

        .glow-bottom-left {
            position: absolute;
            width: 600px;
            height: 600px;
            background-color: #69C9D0;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.1;
            bottom: -200px;
            left: -100px;
            z-index: 0;
        }

        /* Main Layout */
        .content-wrapper {
            z-index: 10;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 100px;
            gap: 80px;
        }

        /* Left Side: Greeting */
        .greeting-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hello-badge {
            display: inline-flex;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            width: fit-content;
            margin-bottom: 24px;
        }

        .hello-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: #69C9D0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .main-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 72px;
            line-height: 1.1;
            margin-bottom: 24px;
            color: #ffffff;
        }

        .hand-wave {
            display: inline-block;
            animation: wave 2.5s infinite;
            transform-origin: 70% 70%;
        }

        @keyframes wave {
            0% { transform: rotate( 0.0deg) }
            10% { transform: rotate(14.0deg) }
            20% { transform: rotate(-8.0deg) }
            30% { transform: rotate(14.0deg) }
            40% { transform: rotate(-4.0deg) }
            50% { transform: rotate(10.0deg) }
            60% { transform: rotate( 0.0deg) }
            100% { transform: rotate( 0.0deg) }
        }

        .welcome-message {
            font-size: 20px;
            line-height: 1.6;
            color: #D1D5DB;
            max-width: 500px;
            border-left: 4px solid #EE1D52;
            padding-left: 24px;
        }

        /* Right Side: Speaker Card */
        .speaker-card {
            width: 400px;
            background-color: rgba(31, 41, 55, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            backdrop-filter: blur(10px);
            position: relative;
        }

        .speaker-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 26px;
            background-color: transparent;
            z-index: -1;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .avatar-container {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background-color: #2D3748;
            margin-bottom: 24px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid rgba(105, 201, 208, 0.3);
            overflow: hidden;
        }
        
        .avatar-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: 50% 25%;
            display: block;
        }

        .speaker-name {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 32px;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .speaker-title {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            color: #9CA3AF;
            margin-bottom: 24px;
            font-weight: 500;
        }
        
        .company-badge {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .company-logo-text {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 16px;
            color: #ffffff;
        }

        /* Bottom Pattern */
        .pattern-dots {
            position: absolute;
            bottom: 40px;
            right: 40px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            opacity: 0.3;
        }

        .dot {
            width: 4px;
            height: 4px;
            background-color: #ffffff;
            border-radius: 50%;
        }

    </style>
</head>
<body>
<div class="slide-container">
<!-- Background Elements -->
<div class="glow-top-right"></div>
<div class="glow-bottom-left"></div>
<!-- Main Content -->
<div class="content-wrapper">
<!-- Left: Greeting -->
<div class="greeting-section">
<div class="hello-badge">
<p class="hello-text"><i class="fas fa-map-marker-alt mr-2"></i>Live in Vietnam</p>
</div>
<h1 class="main-title">
                    Xin chào <br/>
<span style="color: #EE1D52;">Hanoi</span> <span class="hand-wave">👋</span>
</h1>
<div class="welcome-message">
<p>
                        "Vietnam has a very strong mobile app ecosystem. We are excited to see more Vietnamese apps and games growing globally using TikTok."
                    </p>
</div>
</div>
<!-- Right: Speaker -->
<div class="speaker-card">
<div class="avatar-container">
<img class="avatar-image" src="../assets/images/xing-portrait.png" alt="Xing portrait"/>
</div>
<h2 class="speaker-name">Xing</h2>
<p class="speaker-title">Director of XMP Operations</p>
</div>
</div>
<!-- Decorative Dots -->
<div class="pattern-dots">
<div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
<div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
<div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
<div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
</div>
</div>
</body>
</html>
