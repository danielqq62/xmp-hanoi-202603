<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>XMP Campaign Builder</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&amp;family=Inter:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            overflow: hidden;
        }

        .slide-container {
            width: 1280px;
            height: 720px;
            position: relative;
            overflow: hidden;
            background-color: #000000;
            display: flex;
            flex-direction: column;
        }

        .glow-cyan {
            position: absolute;
            width: 520px;
            height: 520px;
            background-color: #69C9D0;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.12;
            top: -180px;
            left: -120px;
            z-index: 0;
        }

        .glow-pink {
            position: absolute;
            width: 520px;
            height: 520px;
            background-color: #EE1D52;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.12;
            bottom: -180px;
            right: -120px;
            z-index: 0;
        }

        .glow-blue {
            position: absolute;
            width: 420px;
            height: 420px;
            background-color: #0057FF;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.08;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        .header {
            z-index: 10;
            padding: 50px 80px 20px 80px;
            text-align: center;
        }

        .title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 52px;
            line-height: 1.1;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .content {
            z-index: 10;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 80px 60px 80px;
        }

        .image-frame {
            position: relative;
            width: 980px;
            border-radius: 18px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
        }

        .image-frame::before {
            content: '';
            position: absolute;
            inset: -20px;
            border-radius: 24px;
            background: radial-gradient(circle at top left, rgba(105, 201, 208, 0.35), transparent 55%),
                        radial-gradient(circle at bottom right, rgba(238, 29, 82, 0.35), transparent 55%);
            opacity: 0.7;
            z-index: -1;
        }

        .image-frame::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            pointer-events: none;
        }

        .report-image {
            width: 100%;
            display: block;
            border-radius: 14px;
        }
</style>
</head>
<body>
<div class="slide-container">
    <div class="glow-cyan"></div>
    <div class="glow-pink"></div>
    <div class="glow-blue"></div>

    <div class="header">
        <h1 class="title">XMP Campaign Builder</h1>
    </div>

    <div class="content">
        <div class="image-frame">
            <img class="report-image" src="../assets/images/screenshot-xmp-publish-preview.png" alt="XMP campaign builder preview"/>
        </div>
    </div>
</div>
</body>
</html>
